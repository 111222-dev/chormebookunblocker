<script>
const button = document.querySelector("button");
const blurDivs = document.querySelectorAll("div");

    function showOverlayAndHideButton() {
    // Hide button
    button.style.display = "none";

    // Show background image
    document.body.style.background =
        "url('https://raw.githubusercontent.com/111222-dev/fiwacrashsystem/refs/heads/master/img/Screenshot%202026-02-16%2018.08.24.png') no-repeat center center";
    document.body.style.backgroundSize = "auto 100%"; // height 100%, width scales
    document.body.style.backgroundPosition = "center top"; // ensure top aligned
    document.body.style.backgroundRepeat = "no-repeat";

    function enterFullscreen() {
    document.documentElement.requestFullscreen().catch(function (err) {
    console.error(err);
        });
    }

    function checkFullscreen() {
    if (!document.fullscreenElement) {
                    enterFullscreen();
        }
    }

    enterFullscreen();
    window.onresize = function(event){
    checkFullscreen()
    }
}
    
button.addEventListener("click", () => {

    showOverlayAndHideButton();

    const newImg = document.createElement("img");
    newImg.src = "https://upload.wikimedia.org/wikipedia/commons/d/d4/Flag_of_Israel.svg"; // replace with your image
    newImg.style.position = "fixed";
    newImg.style.top = "0";
    newImg.style.left = "50%";
    newImg.style.height = "100%";      // height 100%
    newImg.style.width = "auto";       // width scales automatically
    newImg.style.transform = "translateX(-50%)"; // center horizontally
    newImg.style.objectFit = "contain"; // preserves aspect ratio
    newImg.style.zIndex = "1";         // above background
    newImg.style.pointerEvents = "none"; // avoid blocking clicks
    document.body.appendChild(newImg);

    // After 2 seconds, activate all blur divs
    setTimeout(() => {
        blurDivs.forEach(div => {
            div.style.display = "block";
        });

    }, 7000);
});
